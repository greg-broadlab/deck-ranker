<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Deck Ranker{% endblock %} — Broadlab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-logo">broadlab<span>.</span>deck ranker</a>
        <div class="nav-links">
            {% for cat_id, cat_name in all_categories.items() if all_categories is defined %}
            <a href="/rankings/{{ cat_id }}">{{ cat_name }}</a>
            {% endfor %}
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
