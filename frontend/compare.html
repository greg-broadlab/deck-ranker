<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare — BroadLab Deck Ranker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { overflow: hidden; }

.compare-page {
    height: calc(100vh - 56px);
    display: flex;
    flex-direction: column;
}

/* Two slide panels */
.panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    min-height: 0;
    position: relative;
}

.panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--white);
}

.panel:first-child { border-right: 1px solid var(--gray-200); }

.panel-header {
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--gray-100);
    flex-shrink: 0;
}

.panel-name {
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--teal-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.panel-meta { font-size: 0.7rem; color: var(--gray-400); margin-top: 0.1rem; }

.panel-slides {
    flex: 1;
    overflow-y: auto;
    background: #111;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
}

.slide-img { width: 100%; display: block; flex-shrink: 0; cursor: zoom-in; }

/* VS badge floating between panels */
.vs-badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--white);
    border: 2px solid var(--gray-200);
    color: var(--gray-400);
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
}

/* Action bar pinned to bottom */
.action-bar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 1rem;
    padding: 0.875rem 1.5rem;
    background: var(--white);
    border-top: 1px solid var(--gray-200);
    flex-shrink: 0;
}

.action-choose {
    background: var(--teal);
    color: var(--white);
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.25rem;
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    width: 100%;
    text-align: center;
}

.action-choose:hover:not(:disabled) { background: #0d5469; }
.action-choose:disabled { background: var(--gray-100); color: var(--gray-300); cursor: default; }

.action-right { text-align: right; }

.action-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
}

.neither-btn {
    background: none;
    border: 1px solid var(--gray-300);
    color: var(--gray-600);
    padding: 0.5rem 1.1rem;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
}

.neither-btn:hover:not(:disabled) { border-color: #C83B2A; color: #C83B2A; background: #FEF2F2; }
.neither-btn:disabled { opacity: 0.4; cursor: default; }

.skip-link {
    font-size: 0.72rem;
    color: var(--gray-400);
    text-decoration: none;
    transition: color 0.15s;
}

.skip-link:hover { color: var(--gray-600); }

/* Lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.94); z-index: 200; align-items: center; justify-content: center; padding: 2rem; cursor: zoom-out; }
.lightbox-img { max-width: 92vw; max-height: 92vh; object-fit: contain; border-radius: 4px; cursor: default; box-shadow: 0 32px 80px rgba(0,0,0,0.8); }
.lightbox-close { position: fixed; top: 1.25rem; right: 1.5rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 201; font-size: 1rem; transition: background 0.15s; }
.lightbox-close:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-logo">BroadLab Deck Ranker</a>
    <div class="nav-links">
        <span class="nav-category" id="nav-cat"></span>
        <a href="#" id="nav-rankings">Rankings</a>
    </div>
</nav>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
</div>

<div class="loading-overlay" id="loading">
    <div class="loading-box">
        <div class="spinner"></div>
        <p class="loading-title">Finding two decks to compare</p>
        <p class="loading-sub" id="loading-text">Loading...</p>
    </div>
</div>

<div class="compare-page">
    <div class="panels">

        <div class="panel">
            <div class="panel-header">
                <div class="panel-name" id="title-a"></div>
                <div class="panel-meta" id="meta-a"></div>
            </div>
            <div class="panel-slides" id="slides-a"></div>
        </div>

        <div class="vs-badge">VS</div>

        <div class="panel">
            <div class="panel-header">
                <div class="panel-name" id="title-b"></div>
                <div class="panel-meta" id="meta-b"></div>
            </div>
            <div class="panel-slides" id="slides-b"></div>
        </div>

    </div>

    <div class="action-bar">
        <div>
            <button class="action-choose" id="choose-a" onclick="vote('a')" disabled>
                ← Choose this deck
            </button>
        </div>

        <div class="action-center">
            <button class="neither-btn" id="neither-btn" onclick="neither()" disabled>
                Neither — both poor
            </button>
            <a href="#" class="skip-link" id="skip-link">Skip this pair</a>
        </div>

        <div class="action-right">
            <button class="action-choose" id="choose-b" onclick="vote('b')" disabled>
                Choose this deck →
            </button>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
const params = new URLSearchParams(location.search);
const category = params.get('cat') || 'rtb';
const catName = CONFIG.categories[category] || category.toUpperCase();
let deckA = null, deckB = null;

document.getElementById('nav-cat').textContent = catName;
document.getElementById('nav-rankings').href = `rankings.html?cat=${category}`;
document.getElementById('skip-link').href = `compare.html?cat=${category}`;

function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').style.display = 'flex';
}
function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function populateSlides(side, deck) {
    const container = document.getElementById(`slides-${side}`);
    container.innerHTML = '';
    for (let i = 0; i < deck.slide_count; i++) {
        const src = slideUrl(deck.cloudinary_prefix, i);
        const img = document.createElement('img');
        img.src = src;
        img.className = 'slide-img';
        img.loading = i < 3 ? 'eager' : 'lazy';
        img.onclick = () => openLightbox(src);
        container.appendChild(img);
    }
}

function setButtons(enabled) {
    ['choose-a', 'choose-b', 'neither-btn'].forEach(id => {
        document.getElementById(id).disabled = !enabled;
    });
}

async function getPair() {
    document.getElementById('loading-text').textContent = 'Fetching decks...';
    const decks = await SB.get(`/decks?category=eq.${category}&order=matches.asc&limit=40&cloudinary_prefix=not.is.null`);
    if (decks.length < 2) {
        document.getElementById('loading-text').textContent = 'Not enough decks uploaded yet.';
        return;
    }
    const comps = await SB.get(`/comparisons?category=eq.${category}&select=winner_id,loser_id&order=created_at.desc&limit=500`);
    const played = new Set(comps.flatMap(c => [`${c.winner_id}|${c.loser_id}`, `${c.loser_id}|${c.winner_id}`]));

    let found = false;
    for (let i = 0; i < decks.length && !found; i++) {
        for (let j = i + 1; j < decks.length && !found; j++) {
            if (!played.has(`${decks[i].id}|${decks[j].id}`)) {
                deckA = decks[i]; deckB = decks[j]; found = true;
            }
        }
    }
    if (!found) { deckA = decks[0]; deckB = decks[1]; }

    document.getElementById('title-a').textContent = deckA.filename.replace('.pptx', '');
    document.getElementById('title-b').textContent = deckB.filename.replace('.pptx', '');
    document.getElementById('meta-a').textContent = `${deckA.slide_count} slides`;
    document.getElementById('meta-b').textContent = `${deckB.slide_count} slides`;
    populateSlides('a', deckA);
    populateSlides('b', deckB);
    document.getElementById('loading').style.display = 'none';
    setButtons(true);
}

async function vote(side) {
    setButtons(false);
    const winner = side === 'a' ? deckA : deckB;
    const loser  = side === 'a' ? deckB : deckA;
    const { winner: newW, loser: newL } = calcElo(winner.elo, loser.elo);
    await Promise.all([
        SB.post('/comparisons', { category, winner_id: winner.id, loser_id: loser.id }),
        SB.patch(`/decks?id=eq.${winner.id}`, { elo: newW, matches: winner.matches + 1 }),
        SB.patch(`/decks?id=eq.${loser.id}`,  { elo: newL, matches: loser.matches + 1 }),
    ]);
    location.href = `compare.html?cat=${category}`;
}

async function neither() {
    setButtons(false);
    await Promise.all([
        SB.post('/comparisons', { category, winner_id: deckA.id, loser_id: deckB.id }),
        SB.patch(`/decks?id=eq.${deckA.id}`, { elo: deckA.elo - 10, matches: deckA.matches + 1 }),
        SB.patch(`/decks?id=eq.${deckB.id}`, { elo: deckB.elo - 10, matches: deckB.matches + 1 }),
    ]);
    location.href = `compare.html?cat=${category}`;
}

getPair();
</script>
</body>
</html>
